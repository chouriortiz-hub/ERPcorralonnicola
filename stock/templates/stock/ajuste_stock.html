{% extends "base.html" %}
{% block title %}Ajuste de stock — Corralón Nicola{% endblock %}
{% block content %}
<div class="page-header"><h1>Ajuste manual de stock</h1></div>
<form method="post" class="card form-card">
  {% csrf_token %}
  {{ form.non_field_errors }}
  <label>Producto {{ form.producto }} {{ form.producto.errors }}</label>
  <label>Cantidad {{ form.cantidad }}
    <small style="color:var(--texto-muted);">{{ form.cantidad.help_text }}</small>
    {{ form.cantidad.errors }}
  </label>
  <label>Motivo {{ form.motivo }} {{ form.motivo.errors }}</label>
  <div class="actions">
    <button type="submit" class="primary">Registrar ajuste</button>
    <a class="btn btn-outline" href="{% url 'stock:movimiento_list' %}">Cancelar</a>
  </div>
</form>
{% endblock %}
